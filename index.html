<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>볼드 · BOLD</title>
<meta name="description" id="metaDescription" content="BOLD — 대담한 브랜드, 새로운 감각" />

<!-- 원본 쇼핑몰의 골격을 참고한 자체 레이아웃: 헤더 · 사이드드로어 · 메인 · 푸터 -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;600;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f4f6fb;
    --fg: #0a1f44;
    --muted: #5b6a85;
    --line: #0a1f44;
    --accent: #ff6b1a;
    --serif: 'Noto Serif KR', serif;
    --sans:  'Noto Sans KR', 'Archivo', sans-serif;
    --display: 'Archivo', 'Noto Serif KR', serif;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html,body { margin:0; padding:0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color:inherit; text-decoration:none; }
  img { max-width:100%; display:block; }
  button { font-family:inherit; cursor:pointer; border:0; background:none; color:inherit; }

  /* ===== 헤더 ===== */
  .top-util {
    display:flex; justify-content:flex-end; align-items:center;
    gap:18px; font-size:11px; letter-spacing:.12em;
    padding: 10px 28px; border-bottom: 1px solid rgba(0,0,0,.08);
    text-transform:uppercase;
  }
  .top-util a:hover { color: var(--accent); }

  .header {
    position: sticky; top:0; z-index: 40;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .header-inner {
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    padding: 22px 28px;
  }
  .header-left, .header-right {
    display:flex; align-items:center; gap: 18px;
  }
  .header-right { justify-content:flex-end; }
  .logo {
    font-family: var(--display);
    font-weight: 900;
    font-size: 34px;
    letter-spacing: .2em;
    text-align:center;
    display:inline-block;
  }
  .logo img { max-height:44px; display:inline-block; }
  .icon-btn {
    width:42px; height:42px; display:inline-flex;
    align-items:center; justify-content:center;
    border:1px solid transparent; border-radius:50%;
    transition: .2s;
  }
  .icon-btn:hover { border-color: var(--line); }
  .icon-btn svg { width:20px; height:20px; }

  /* 네비 */
  .nav {
    display:flex; justify-content:center; gap: 42px;
    padding: 14px 0 22px;
    font-family: var(--display);
    font-weight: 500;
    letter-spacing: .18em;
    font-size: 13px;
    text-transform: uppercase;
  }
  .nav a { position:relative; padding: 4px 2px; }
  .nav a::after {
    content:''; position:absolute; left:0; bottom:-4px;
    width:100%; height:1px; background: var(--fg);
    transform-origin:right; transform:scaleX(0);
    transition: transform .35s ease;
  }
  .nav a:hover::after { transform-origin:left; transform:scaleX(1); }

  /* ===== 사이드 드로어 ===== */
  .aside {
    position:fixed; top:0; left:-360px; height:100vh; width:340px;
    background: var(--fg); color:#fff; padding: 32px 28px;
    transition: left .45s cubic-bezier(.6,.01,.05,1);
    z-index:80; display:flex; flex-direction:column;
  }
  .aside.open { left:0; }
  .aside-logo { font-family:var(--display); font-weight:900; font-size:22px; letter-spacing:.25em; }
  .aside-close { position:absolute; top:22px; right:22px; }
  .aside-close svg { width:22px; height:22px; }
  .aside nav { margin-top: 48px; display:flex; flex-direction:column; gap:22px; font-family:var(--display); font-size:18px; letter-spacing:.2em; text-transform:uppercase; }
  .aside-footer { margin-top:auto; font-size:11px; opacity:.5; letter-spacing:.15em; }

  .backdrop {
    position:fixed; inset:0; background: rgba(0,0,0,.5);
    opacity:0; pointer-events:none; transition: .3s; z-index:70;
  }
  .backdrop.on { opacity:1; pointer-events:auto; }

  /* ===== 히어로 ===== */
  .hero {
    min-height: 78vh;
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    align-items:end;
    padding: 60px 28px 72px;
    gap: 40px;
    position:relative;
    border-bottom:1px solid var(--line);
  }
  .hero-title {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(60px, 12vw, 200px);
    line-height: .88;
    letter-spacing: -.02em;
    margin:0;
    text-transform: uppercase;
  }
  .hero-title em {
    font-style: italic;
    font-family: var(--serif);
    font-weight: 900;
    color: var(--accent);
  }
  .hero-sub {
    font-family: var(--serif);
    font-size: clamp(15px, 1.3vw, 19px);
    line-height: 1.7;
    max-width: 420px;
    margin: 0 0 18px;
    color: #1a1a1a;
  }
  .hero-sub small { display:block; font-family:var(--display); font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
  .hero-visual {
    position:absolute;
    top: 80px; right: 28px;
    width: 40vw; max-width: 520px; aspect-ratio: 4/5;
    background: var(--fg) center/cover no-repeat;
    filter: grayscale(.1);
  }
  /* 대문 슬라이드쇼 */
  .hero-slideshow {
    position:absolute;
    top: 80px; right: 28px;
    width: 40vw; max-width: 520px; aspect-ratio: 4/5;
    overflow:hidden;
    background: var(--fg);
  }
  .hero-slideshow .hslide {
    position:absolute; inset:0;
    background: var(--fg) center/cover no-repeat;
    opacity:0;
    transition: opacity 1.1s ease-in-out;
  }
  .hero-slideshow .hslide.active { opacity:1; }
  .hero-slideshow .slide-caption {
    position:absolute; left:18px; bottom:40px; right:18px;
    color:#fff; font-family: var(--display);
    text-transform:uppercase; letter-spacing:.18em;
    text-shadow: 0 1px 8px rgba(0,0,0,.6);
    pointer-events:none;
  }
  .hero-slideshow .slide-caption strong { display:block; font-size:14px; }
  .hero-slideshow .slide-caption small { display:block; font-size:11px; opacity:.8; margin-top:4px; letter-spacing:.2em; }
  .hero-slideshow .slide-dots {
    position:absolute; bottom: 14px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:8px;
    z-index:5;
  }
  .hero-slideshow .sdot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
    padding:0; cursor:pointer;
    transition:.2s;
  }
  .hero-slideshow .sdot.active { background:#fff; transform:scale(1.15); }
  .hero-slideshow .slide-arrow {
    position:absolute; top:50%; transform:translateY(-50%);
    width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,.15);
    color:#fff; display:flex; align-items:center; justify-content:center;
    z-index:5; transition:.2s;
    backdrop-filter: blur(4px);
  }
  .hero-slideshow .slide-arrow:hover { background:rgba(255,255,255,.3); }
  .hero-slideshow .slide-arrow.prev { left:10px; }
  .hero-slideshow .slide-arrow.next { right:10px; }
  .hero-slideshow .slide-arrow svg { width:18px; height:18px; }
  .hero-marquee {
    position:absolute; bottom: 18px; left:0; right:0;
    white-space:nowrap; overflow:hidden;
    font-family:var(--display); font-size:12px; letter-spacing:.3em; text-transform:uppercase;
    color: var(--muted);
    border-top:1px solid rgba(0,0,0,.15);
    padding: 14px 0;
  }
  .hero-marquee span { display:inline-block; padding: 0 30px; animation: scroll 28s linear infinite; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ===== 공통 섹션 ===== */
  section.block {
    padding: 110px 28px;
    border-bottom: 1px solid var(--line);
    position:relative;
  }
  .block-header {
    display:flex; align-items:baseline; gap: 24px;
    margin-bottom: 56px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }
  .block-index {
    font-family: var(--display); font-weight:700;
    font-size: 12px; letter-spacing:.3em;
    color: var(--muted);
  }
  .block-title {
    font-family: var(--display); font-weight: 900;
    font-size: clamp(36px, 6vw, 84px);
    letter-spacing:-.01em;
    margin:0; text-transform: uppercase;
  }
  .block-subtitle {
    font-family: var(--serif); font-size:14px; color:var(--muted);
    margin-left:auto;
  }

  /* 텍스트 블록 */
  .text-body {
    font-family: var(--serif);
    font-size: clamp(17px, 1.6vw, 24px);
    line-height: 1.8;
    max-width: 780px;
    margin: 0 auto;
  }
  .text-body p + p { margin-top: 1.2em; }

  /* 이미지+텍스트 블록 */
  .image-text {
    display:grid; grid-template-columns: 1.1fr 1fr; gap:60px;
    align-items:center;
  }
  .image-text img { aspect-ratio: 4/5; object-fit:cover; width:100%; background:#eee; }
  .image-text .text h3 {
    font-family: var(--display); font-size: clamp(28px,3vw,44px);
    margin:0 0 16px; font-weight:900; letter-spacing:-.01em;
  }
  .image-text .text p {
    font-family: var(--serif); line-height:1.8; font-size:16px;
    color:#222;
  }

  /* 갤러리 (쇼핑몰 상품 그리드 스타일) */
  .gallery-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 32px 22px;
  }
  .card {
    display:block;
    transition: transform .4s;
  }
  .card:hover { transform: translateY(-4px); }
  .card .ph {
    aspect-ratio: 3/4;
    background: var(--bg-soft) center/cover no-repeat;
    margin-bottom: 14px;
    position:relative;
    overflow:hidden;
  }
  .card .ph::after {
    content:''; position:absolute; inset:0; background:rgba(0,0,0,0);
    transition: .3s;
  }
  .card:hover .ph::after { background: rgba(0,0,0,.08); }
  .card-tag {
    position:absolute; top:12px; left:12px;
    font-family: var(--display); font-size:10px; letter-spacing:.2em;
    background: var(--accent); color:#fff;
    padding: 4px 8px; text-transform:uppercase;
  }
  .card h4 { font-family:var(--display); font-weight:700; font-size:14px; letter-spacing:.05em; margin: 8px 0 4px; text-transform:uppercase; }
  .card p  { font-family:var(--serif); font-size:13px; color: var(--muted); margin:0; line-height:1.5; }
  .card .price { font-family:var(--display); font-size:13px; margin-top:6px; font-weight:700; }

  /* CTA */
  .cta {
    text-align:center;
    padding: 140px 28px;
    background: var(--fg);
    color: #fff;
    border-bottom:1px solid var(--line);
  }
  .cta .block-title { color:#fff; border:0; }
  .cta-text { font-family: var(--serif); font-size: clamp(18px,2vw,24px); max-width:620px; margin: 0 auto 34px; line-height:1.7; opacity:.85; }
  .btn-bold {
    display:inline-block; padding: 18px 44px;
    border: 1.5px solid #fff;
    font-family: var(--display); letter-spacing:.25em; font-size:13px; text-transform:uppercase;
    transition: .25s;
  }
  .btn-bold:hover { background:#fff; color:var(--fg); }

  /* 푸터 */
  footer {
    padding: 70px 28px 40px;
    background: var(--bg-soft);
    font-size:12px; color: var(--muted);
    font-family: var(--display); letter-spacing:.1em;
  }
  .footer-top {
    display:grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap:40px;
    padding-bottom: 44px; border-bottom:1px solid rgba(0,0,0,.15);
  }
  .footer-top h5 { font-family:var(--display); font-weight:900; font-size:13px; letter-spacing:.2em; color:var(--fg); margin:0 0 16px; text-transform:uppercase; }
  .footer-top .brand { font-family:var(--display); font-weight:900; font-size:28px; letter-spacing:.2em; color:var(--fg); }
  .footer-top ul { list-style:none; padding:0; margin: 10px 0 0; display:flex; flex-direction:column; gap:8px; }
  .footer-top a:hover { color:var(--accent); }
  .footer-bottom { padding-top: 24px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; }

  /* 로딩 상태 */
  .loading { opacity:.4; pointer-events:none; }
  .empty-note { text-align:center; font-family:var(--serif); color:var(--muted); padding: 60px 0; }

  /* ===== 샘플 모드 배너 ===== */
  .sample-banner {
    display:none;
    background: var(--accent); color:#fff;
    font-family: var(--display); font-size: 12px; letter-spacing:.05em;
    padding: 11px 20px;
    text-align:center;
    align-items:center; justify-content:center; gap:14px; flex-wrap:wrap;
  }
  .sample-banner.on { display:flex; }
  .sample-banner b { font-weight: 900; }
  .sample-banner .sample-cta {
    background:#fff; color: var(--fg); padding: 4px 12px; font-weight:700;
    letter-spacing:.08em; text-transform:uppercase; font-size:11px;
    transition:.15s;
  }
  .sample-banner .sample-cta:hover { background: var(--fg); color:#fff; }
  .sample-banner .sample-cta-ghost { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.6); }
  .sample-banner .sample-cta-ghost:hover { background:#fff; color:var(--accent); border-color:#fff; }
  .sample-banner .sample-or { opacity:.7; font-size:11px; }

  /* ===== 섹션 편집 힌트 (항상 보임) ===== */
  .edit-hint {
    position:absolute; top:14px; right:14px;
    z-index:5;
    display:inline-flex; align-items:center; gap:6px;
    font-family: var(--display); font-size: 10px; letter-spacing:.2em;
    text-transform:uppercase;
    padding: 5px 10px;
    background: rgba(10,31,68,.88);
    color:#fff;
    border-radius: 2px;
    opacity: .72;
    transition:.2s;
    backdrop-filter: blur(4px);
  }
  .edit-hint:hover { opacity:1; background: var(--accent); }
  .edit-hint .eh-icon { width:11px; height:11px; }
  .edit-hint .eh-type { opacity:.75; padding-left:6px; border-left:1px solid rgba(255,255,255,.3); margin-left:2px; }
  .cta { position:relative; }
  @media (max-width: 600px) {
    .edit-hint { font-size:9px; padding:3px 7px; top:10px; right:10px; }
    .edit-hint .eh-type { display:none; }
  }

  /* ===== 반응형 ===== */
  @media (max-width: 900px) {
    .nav { gap:20px; font-size:11px; flex-wrap:wrap; padding: 10px 14px 18px; }
    .hero { grid-template-columns: 1fr; padding: 40px 20px 60px; min-height:auto; }
    .hero-visual { position:relative; top:auto; right:auto; width:100%; max-width:none; order:-1; margin-bottom:24px; aspect-ratio: 5/4; }
    .hero-slideshow { position:relative; top:auto; right:auto; width:100%; max-width:none; order:-1; margin-bottom:24px; aspect-ratio: 5/4; }
    .hero-marquee { position:relative; }
    section.block { padding: 72px 20px; }
    .block-header { flex-direction:column; align-items:flex-start; gap:10px; }
    .block-subtitle { margin-left:0; }
    .image-text { grid-template-columns: 1fr; gap:30px; }
    .footer-top { grid-template-columns: 1fr 1fr; }
    .header-inner { padding: 16px 18px; }
    .logo { font-size:24px; }
    .top-util { padding: 8px 18px; font-size:10px; gap:12px; }
  }

  /* 스크롤 리빌 */
  .reveal { opacity:0; transform: translateY(24px); transition: opacity .8s, transform .8s; }
  .reveal.on { opacity:1; transform:none; }
</style>
</head>
<body>

<!-- 샘플 모드 배너 (DB 비었을 때만 on 클래스 추가됨) -->
<div class="sample-banner" id="sampleBanner">

<!-- 상단 유틸 -->
<div class="top-util">

<!-- 헤더 -->
<header class="header">
  <div class="header-inner">

      <button class="icon-btn" id="btnOpenAside" aria-label="메뉴 열기">

<!-- 사이드 드로어 -->
<div class="backdrop" id="backdrop"></div>
<aside class="aside" id="aside">

<main id="main">

</main>

  <div class="footer-top">
    <div>
      <div class="brand" id="footerBrand">BOLD</div>
      <p style="font-family:var(--serif); margin:12px 0 0; line-height:1.7;" id="footerDesc">
        대담한 브랜드, 새로운 감각.
      </p>
    </div>
    <div>
      <h5>CONTACT</h5>

      <h5>LINK</h5>
      <ul>
        <li><a href="#top">TOP</a></li>

<script type="module">
  // ================== Supabase 설정 ==================
  // ※ 아래 두 값만 본인 Supabase 프로젝트 값으로 교체하세요.
  const SUPABASE_URL = 'https://vhhfaeyhlubvhezyagwd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoaGZhZXlobHVidmhlenlhZ3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjI0MzIsImV4cCI6MjA5MDU5ODQzMn0.gCV87dZiA-2Nl3y7eo0nxGEMOKD_JX6ohfsZxLSccWE';

  // Supabase JS (ESM CDN)
  const useSupabase = !SUPABASE_URL.includes('YOUR-PROJECT');
  let supabase = null;
  if (useSupabase) {
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  // ================== 사이드 드로어 ==================
  const aside = document.getElementById('aside');
  const backdrop = document.getElementById('backdrop');
  document.getElementById('btnOpenAside').onclick = () => { aside.classList.add('open'); backdrop.classList.add('on'); };
  document.getElementById('btnCloseAside').onclick = () => { aside.classList.remove('open'); backdrop.classList.remove('on'); };
  backdrop.onclick = () => { aside.classList.remove('open'); backdrop.classList.remove('on'); };

  // ================== 데이터 가져오기 ==================
  async function fetchSettings() {
    if (!useSupabase) return defaultSettings();
    const { data, error } = await supabase.from('site_settings').select('*').eq('id', 1).single();
    if (error) { console.warn(error); return defaultSettings(); }
    return data;
  }
  async function fetchSections() {
    if (!useSupabase) return { data: defaultSections(), isSample: true };
    const { data, error } = await supabase
      .from('sections')
      .select('*, items(*)')
      .eq('is_visible', true)
      .order('sort_order', { ascending: true });
    if (error) { console.warn(error); return { data: defaultSections(), isSample: true }; }
    if (!data || data.length === 0) return { data: defaultSections(), isSample: true };
    // items 정렬
    data.forEach(s => {
      if (s.items) s.items = s.items
        .filter(i => i.is_visible !== false)
        .sort((a,b)=> (a.sort_order||0) - (b.sort_order||0));
    });
    return { data, isSample: false };
  }

  // ================== 렌더 ==================
  const $ = (s,p=document) => p.querySelector(s);
  const $$ = (s,p=document) => Array.from(p.querySelectorAll(s));

  function applySettings(s) {
    document.title = `${s.site_name || '볼드'} · ${s.site_tagline || 'BOLD'}`;
    $('#metaDescription').content = s.seo_description || '';
    if (s.logo_url) {
      $('#siteLogo').innerHTML = `<img src="${s.logo_url}" alt="${s.site_name||''}">`;
    } else {
      $('#siteLogo').textContent = s.site_tagline || 'BOLD';
    }
    $('#asideLogo').textContent = s.site_tagline || 'BOLD';
    $('#footerBrand').textContent = s.site_tagline || 'BOLD';
    $('#footerCopyright').textContent = s.footer_text || '';
    $('#footerDesc').textContent = s.seo_description || '';

    const contactUl = $('#footerContact'); contactUl.innerHTML = '';
    if (s.contact_email) contactUl.insertAdjacentHTML('beforeend', `<li><a href="mailto:${s.contact_email}">${s.contact_email}</a></li>`);
    if (s.contact_phone) contactUl.insertAdjacentHTML('beforeend', `<li>${s.contact_phone}</li>`);
    if (s.contact_address) contactUl.insertAdjacentHTML('beforeend', `<li>${s.contact_address}</li>`);

    const socialUl = $('#footerSocial'); socialUl.innerHTML = '';
    if (s.social_instagram) socialUl.insertAdjacentHTML('beforeend', `<li><a href="${s.social_instagram}" target="_blank">INSTAGRAM</a></li>`);
    if (s.social_youtube) socialUl.insertAdjacentHTML('beforeend', `<li><a href="${s.social_youtube}" target="_blank">YOUTUBE</a></li>`);
    if (s.social_facebook) socialUl.insertAdjacentHTML('beforeend', `<li><a href="${s.social_facebook}" target="_blank">FACEBOOK</a></li>`);

    if (s.theme_primary_color) document.documentElement.style.setProperty('--fg', s.theme_primary_color);
    if (s.theme_accent_color)  document.documentElement.style.setProperty('--accent', s.theme_accent_color);
  }

  function renderNav(sections) {
    const nav = $('#mainNav');
    const aside = $('#asideNav');
    nav.innerHTML = ''; aside.innerHTML = '';
    sections.forEach(s => {
      const label = (s.title || s.slug || '').toString();
      if (!label) return;
      nav.insertAdjacentHTML('beforeend', `<a href="#${s.slug}">${label}</a>`);
      aside.insertAdjacentHTML('beforeend', `<a href="#${s.slug}">${label}</a>`);
    });
  }

  function renderSection(s, idx, isSample) {
    const anchor = `id="${s.slug}"`;
    const typeLabel = {
      hero:'대문',
      text:'본문',
      image_text:'이미지+글',
      gallery:'갤러리',
      cta:'CTA'
    }[s.type||'text'] || s.type;
    const editHint = `
      <a class="edit-hint" href="admin.html" title="관리자 페이지 → 섹션 관리에서 '${escape(s.title||s.slug)}' 편집">
        <svg class="eh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        № ${String(idx+1).padStart(2,'0')} · ${escape(s.slug)}
        <span class="eh-type">${typeLabel}</span>
      </a>`;
    const header = `
      <div class="block-header reveal">
        <span class="block-index">№ ${String(idx+1).padStart(2,'0')}</span>
        <h2 class="block-title">${escape(s.title||'')}</h2>
        ${s.subtitle ? `<span class="block-subtitle">${escape(s.subtitle)}</span>` : ''}
      </div>`;

    switch ((s.type||'text')) {
      case 'hero': {
        const heroSlides = (s.items || []).filter(i => i.image_url);
        let visual = '';
        if (heroSlides.length >= 1) {
          visual = `
            <div class="hero-slideshow reveal" data-autoplay="4500">
              ${heroSlides.map((it,i) => `
                <div class="hslide${i===0?' active':''}" style="background-image:url('${it.image_url}');"></div>
              `).join('')}
              ${heroSlides.length > 1 ? `
                <button class="slide-arrow prev" aria-label="이전">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="slide-arrow next" aria-label="다음">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <div class="slide-dots">
                  ${heroSlides.map((_,i) => `<button class="sdot${i===0?' active':''}" data-idx="${i}" aria-label="슬라이드 ${i+1}"></button>`).join('')}
                </div>
              ` : ''}
              ${heroSlides[0].title || heroSlides[0].subtitle ? `
                <div class="slide-caption" id="slideCaption_${s.id}">
                  ${heroSlides[0].title ? `<strong>${escape(heroSlides[0].title)}</strong>` : ''}
                  ${heroSlides[0].subtitle ? `<small>${escape(heroSlides[0].subtitle)}</small>` : ''}
                </div>` : ''}
            </div>`;
        } else if (s.image_url) {
          visual = `<div class="hero-visual reveal" style="background-image:url('${s.image_url}');"></div>`;
        }
        return `
        <section ${anchor} class="hero" style="${(s.image_url || heroSlides.length) ? '': 'background:linear-gradient(180deg,var(--bg),var(--bg-soft));'}">
          ${editHint}
          <div>
            <h1 class="hero-title reveal">${escape(s.title||'')}${s.subtitle ? `<br><em>${escape(s.subtitle)}</em>` : ''}</h1>
            <p class="hero-sub reveal"><small>INTRO</small>${nl2br(escape(s.body||''))}</p>
            ${s.link_url ? `<a class="btn-bold reveal" style="border-color:var(--fg); color:var(--fg);" href="${s.link_url}">${escape(s.link_label||'LEARN MORE')}</a>`: ''}
          </div>
          ${visual}
          <div class="hero-marquee"><span>${(escape(s.title||'BOLD')+' · ').repeat(20)}</span></div>
        </section>`;
      }

      case 'text':
        return `
        <section ${anchor} class="block">
          ${editHint}
          ${header}
          <div class="text-body reveal">${nl2br(escape(s.body||''))}</div>
        </section>`;

      case 'image_text':
        return `
        <section ${anchor} class="block">
          ${editHint}
          ${header}
          <div class="image-text reveal">
            ${s.image_url ? `<img src="${s.image_url}" alt="">` : `<div style="aspect-ratio:4/5; background:var(--bg-soft);"></div>`}
            <div class="text">
              <h3>${escape(s.title||'')}</h3>
              <p>${nl2br(escape(s.body||''))}</p>
              ${s.link_url ? `<a class="btn-bold" style="margin-top:22px; color:var(--fg); border-color:var(--fg);" href="${s.link_url}">${escape(s.link_label||'VIEW MORE')}</a>`:''}
            </div>
          </div>
        </section>`;

      case 'gallery':
        const cards = (s.items||[]).map(i => `
          <a class="card reveal" href="${i.link_url||'#'}">
            <div class="ph" style="background-image:url('${i.image_url||''}');">
              ${i.tag ? `<span class="card-tag">${escape(i.tag)}</span>`:''}
            </div>
            <h4>${escape(i.title||'')}</h4>
            ${i.subtitle ? `<p>${escape(i.subtitle)}</p>`:''}
            ${i.price ? `<div class="price">${escape(i.price)}</div>`:''}
          </a>`).join('');
        return `
        <section ${anchor} class="block">
          ${editHint}
          ${header}
          ${s.body ? `<p class="reveal" style="font-family:var(--serif); max-width:620px; margin:-24px 0 40px; color:#333;">${escape(s.body)}</p>`: ''}
          <div class="gallery-grid">${cards || `<div class="empty-note" style="grid-column:1/-1;">항목이 없습니다.</div>`}</div>
        </section>`;

      case 'cta':
        return `
        <section ${anchor} class="cta">
          ${editHint}
          <div class="block-header reveal" style="justify-content:center; border-color:rgba(255,255,255,.2);">
            <span class="block-index" style="color:rgba(255,255,255,.6);">№ ${String(idx+1).padStart(2,'0')}</span>
            <h2 class="block-title">${escape(s.title||'')}</h2>
          </div>
          <p class="cta-text reveal">${nl2br(escape(s.body||''))}</p>
          ${s.link_url ? `<a class="btn-bold reveal" href="${s.link_url}">${escape(s.link_label||'GET IN TOUCH')}</a>`:''}
        </section>`;

      default:
        return `
        <section ${anchor} class="block">
          ${editHint}
          ${header}
          <div class="text-body reveal">${nl2br(escape(s.body||''))}</div>
        </section>`;
    }
  }

  function escape(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function nl2br(s) { return s.replace(/\n/g,'<br>'); }

  // 스크롤 리빌
  function initReveal() {
    const io = new IntersectionObserver(es => {
      es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); io.unobserve(e.target); }});
    }, { threshold:.12 });
    $$('.reveal').forEach(el => io.observe(el));
  }

  // 대문 슬라이드쇼
  function initSlideshows(sections) {
    $$('.hero-slideshow').forEach(root => {
      const slides = $$('.hslide', root);
      const dots = $$('.sdot', root);
      if (slides.length <= 1) return;
      // 캡션 업데이트용 — 해당 섹션의 items 배열 복원
      const captionEl = root.querySelector('.slide-caption');
      const section = sections.find(s => root.closest('section')?.id === s.slug);
      const heroItems = (section?.items||[]).filter(i => i.image_url);
      const updateCaption = (n) => {
        if (!captionEl) return;
        const it = heroItems[n];
        captionEl.innerHTML = (it?.title ? `<strong>${escapeHTML(it.title)}</strong>` : '')
          + (it?.subtitle ? `<small>${escapeHTML(it.subtitle)}</small>` : '');
      };
      let idx = 0, timer;
      const delay = parseInt(root.dataset.autoplay || '4500', 10);
      const go = (n) => {
        slides[idx].classList.remove('active');
        dots[idx]?.classList.remove('active');
        idx = (n + slides.length) % slides.length;
        slides[idx].classList.add('active');
        dots[idx]?.classList.add('active');
        updateCaption(idx);
      };
      const start = () => { timer = setInterval(() => go(idx+1), delay); };
      const reset = () => { clearInterval(timer); start(); };
      dots.forEach((d,i) => d.onclick = () => { go(i); reset(); });
      root.querySelector('.slide-arrow.prev')?.addEventListener('click', () => { go(idx-1); reset(); });
      root.querySelector('.slide-arrow.next')?.addEventListener('click', () => { go(idx+1); reset(); });
      // 마우스 올리면 일시정지
      root.addEventListener('mouseenter', () => clearInterval(timer));
      root.addEventListener('mouseleave', () => start());
      start();
    });
  }
  function escapeHTML(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ================== 실행 ==================
  try {
    const [settings, sectionsResult] = await Promise.all([fetchSettings(), fetchSections()]);
    const sections = sectionsResult.data;
    const isSample = sectionsResult.isSample;
    applySettings(settings);
    renderNav(sections);
    if (isSample) $('#sampleBanner').classList.add('on');
    const html = sections.map((s,i)=> renderSection(s,i,isSample)).join('');
    $('#main').innerHTML = html || `<div class="empty-note">섹션이 비어있습니다. 관리자 페이지에서 추가해 주세요.</div>`;
    initReveal();
    initSlideshows(sections);
  } catch (e) {
    console.error(e);
    $('#main').innerHTML = `<div class="empty-note">데이터 로딩 실패. Supabase 설정을 확인해 주세요.</div>`;
  }
</script>
